                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: threshold

      - uid: cert-weak-signature
        title: Certificate Uses Weak Signature (SHA-1)
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
