        title: Laravel Error Rate Spike
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
        annotations:
          summary: "Laravel error rate exceeded 200 in 5 minutes (deadlocks excluded)"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: P8E80F9AEF21F6940
            model:
              expr: 'sum(count_over_time({log_type="laravel"} |~ "(?i)error|exception|fatal" != "Serialization failure: 1213 Deadlock" [5m]))'
              refId: A
          - refId: error_count
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
