# Alert rule groups — read by provision-alerts.py at container startup.
# These rules are provisioned via the Grafana API (not Grafana's built-in file
# provisioner) so they are fully editable in the Grafana UI.
#
# Live-edit contract:
#   - Edit a rule in the Grafana UI → takes effect immediately.
#   - Container restart or redeploy → this file wins, UI edits are overwritten.
#   - To make a change permanent → edit this file and raise a PR.

groups:
  - orgId: 1
    name: Temperature
    folder: Hardware
    interval: 1m
    rules:
      - uid: room-temp-warning
        title: Room Temperature Warning
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "Server room temperature is {{ $values.temp_c.Value | printf \"%.1f\" }}°C (warning: 29.5°C, critical: 30°C) — check cooling"
          panelUrl: "/d/server-room-temperature?orgId=1&viewPanel=4"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: room_temperature_celsius
              refId: A
          - refId: temp_c
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: temp_c
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: temp_c
              conditions:
                - evaluator:
                    type: within_range
                    params:
                      - 29.5
                      - 30
              refId: threshold

      - uid: room-temp-critical
        title: Room Temperature Critical
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: "Server room temperature is {{ $values.temp_c.Value | printf \"%.1f\" }}°C (threshold: 30°C) — take immediate action"
          panelUrl: "/d/server-room-temperature?orgId=1&viewPanel=4"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: room_temperature_celsius
              refId: A
          - refId: temp_c
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: temp_c
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: temp_c
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 30
              refId: threshold

  - orgId: 1
    name: SAN
    folder: Hardware
    interval: 1m
    rules:
      - uid: powerstore-major-alert
        title: PowerStore Major Alert
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          summary: "PowerStore has {{ $values.alert_count.Value | printf \"%.0f\" }} active Major/Critical alert(s)"
          panelUrl: "/d/powerstore-crown?orgId=1&viewPanel=49"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: sum(powerstore_active_alert_count{severity=~"Critical|Major"})
              refId: A
          - refId: alert_count
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: alert_count
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: alert_count
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: threshold

      - uid: powerstore-capacity
        title: PowerStore Capacity High
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          summary: "PowerStore {{ $labels.appliance_id }} physical capacity at {{ $values.pct_used.Value | printf \"%.1f\" }}% used (threshold: 75%)"
          panelUrl: "/d/powerstore-crown?orgId=1&viewPanel=11"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_cap_last_physical_used / powerstore_cap_last_physical_total * 100 and powerstore_cap_last_physical_total > 0
              refId: A
          - refId: pct_used
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_used
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_used
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 75
              refId: threshold

      - uid: powerstore-drive-wear
        title: PowerStore Drive Wear Low
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          summary: "PowerStore drive {{ $labels.name }} on {{ $labels.appliance_id }} has {{ $values.pct_remaining.Value | printf \"%.1f\" }}% endurance remaining"
          panelUrl: "/d/powerstore-crown?orgId=1&viewPanel=42"
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_wear_metrics_by_drive
              refId: A
          - refId: pct_remaining
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_remaining
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_remaining
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 20
              refId: threshold

      - uid: powerstore-eth-port-down
        title: PowerStore ETH Port Link Down
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          summary: "PowerStore ETH port {{ $labels.eth_port_id }} on appliance {{ $labels.appliance_id }} link is down"
          panelUrl: "/d/powerstore-crown?orgId=1&viewPanel=49"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_eth_port_is_link_up == 0 and on(appliance_id, eth_port_id) (max_over_time(powerstore_eth_port_is_link_up[8h]) == 1)
              refId: A
          - refId: link_up
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: link_up
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: link_up
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              refId: threshold

      - uid: powerstore-eth-port-errors
        title: PowerStore ETH Port Errors
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          summary: "PowerStore ETH port {{ $labels.eth_port_id }} on appliance {{ $labels.appliance_id }} has sustained packet errors: {{ $values.errors_per_sec.Value | printf \"%.0f\" }}/s"
          panelUrl: "/d/powerstore-crown?orgId=1&viewPanel=49"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_metricEthPort_avg_pkt_rx_crc_error_ps + powerstore_metricEthPort_avg_pkt_tx_error_ps
              refId: A
          - refId: errors_per_sec
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: errors_per_sec
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: errors_per_sec
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 100
              refId: threshold

      - uid: powerstore-metro-status
        title: PowerStore Metro Replication Not Engaged
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          summary: "PowerStore metro session {{ $labels.id }} is not Engaged (state={{ $values.state.Value | printf \"%.0f\" }}: 0=Initializing 1=Disengaged 2=Engaged 3=WitnessInvalid 4=FailedInit 5=Unconfiguring)"
          panelUrl: "/d/powerstore-crown?orgId=1&viewPanel=49"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_metro_status
              refId: A
          - refId: state
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: state
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: state
              conditions:
                - evaluator:
                    type: outside_range
                    params:
                      - 2
                      - 2
              refId: threshold

      - uid: powerstore-metro-witness
        title: PowerStore Metro Witness Not OK
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          summary: "PowerStore metro witness {{ $labels.name }} is not OK (state={{ $values.state.Value | printf \"%.0f\" }}: 0=OK 1=PartiallyConnected 2=Disconnected 3=Deleting 4=Initializing)"
          panelUrl: "/d/powerstore-crown?orgId=1&viewPanel=49"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_metro_witness_status
              refId: A
          - refId: state
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: state
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: state
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: threshold

  - orgId: 1
    name: ESXi
    folder: VMware
    interval: 1m
    rules:
      # Threshold gt:5 = alert when usage exceeds HA headroom by more than 5%.
      # The 5% buffer prevents noise from near-threshold fluctuations and also
      # suppresses spurious fires on single-host clusters where (N-1)/N = 0%.
      - uid: vcenter-host-cpu-high
        title: vCenter Cluster CPU HA Headroom Exceeded
        condition: threshold
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
        annotations:
          summary: "Cluster {{ $labels.vmwcluster }} CPU is {{ $values.pct_surplus.Value | printf \"%.1f\" }}% above HA failover headroom"
          panelUrl: "/d/VMwExClV?orgId=1&viewPanel=14"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "(sum by (vmwcluster)(vmware_host_cpu_usagemhz_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) / sum by (vmwcluster)(vmware_host_cpu_capacity * vmware_host_cpu_corecount * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) * 100) - ((count by (vmwcluster)(vmware_host_cpu_usagemhz_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) - 1) / count by (vmwcluster)(vmware_host_cpu_usagemhz_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) * 100)"
              refId: A
          - refId: pct_surplus
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_surplus
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_surplus
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
              refId: threshold

      # Threshold gt:5 — same 5% buffer rationale as vcenter-host-cpu-high above.
      - uid: vcenter-cluster-mem-high
        title: vCenter Cluster Memory HA Headroom Exceeded
        condition: threshold
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
        annotations:
          summary: "Cluster {{ $labels.vmwcluster }} memory is {{ $values.pct_surplus.Value | printf \"%.1f\" }}% above HA failover headroom"
          panelUrl: "/d/VMwExClV?orgId=1&viewPanel=16"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "(sum by (vmwcluster)(vmware_host_mem_consumed_average * 1024 * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) / sum by (vmwcluster)(vmware_host_mem_capacity * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) * 100) - ((count by (vmwcluster)(vmware_host_mem_consumed_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) - 1) / count by (vmwcluster)(vmware_host_mem_consumed_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) * 100)"
              refId: A
          - refId: pct_surplus
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_surplus
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_surplus
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
              refId: threshold

      - uid: vcenter-datastore-space-low
        title: vCenter Datastore Space Low
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
        annotations:
          summary: "Datastore {{ $labels.ds }} has {{ $values.free_pct.Value | printf \"%.1f\" }}% free space remaining (warning: <20%, critical: <5%)"
          panelUrl: "/d/VMwExDsV?orgId=1&viewPanel=100"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: min by (ds,vcenter)(vmware_datastore_free / vmware_datastore_capacity * 100 * on(dsmo,vcenter) group_left(ds) max by (dsmo,vcenter,ds)(vmware_datastore_info))
              refId: A
          - refId: free_pct
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: free_pct
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: free_pct
              conditions:
                - evaluator:
                    type: within_range
                    params:
                      - 5
                      - 20
              refId: threshold

      - uid: vcenter-datastore-space-critical
        title: vCenter Datastore Space Critical
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          summary: "Datastore {{ $labels.ds }} is over 95% full — {{ $values.free_pct.Value | printf \"%.1f\" }}% free"
          panelUrl: "/d/VMwExDsV?orgId=1&viewPanel=100"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: min by (ds,vcenter)(vmware_datastore_free / vmware_datastore_capacity * 100 * on(dsmo,vcenter) group_left(ds) max by (dsmo,vcenter,ds)(vmware_datastore_info))
              refId: A
          - refId: free_pct
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: free_pct
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: free_pct
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 5
              refId: threshold

      - uid: vcenter-host-mem-balloon
        title: vCenter Host Memory Balloon Active
        condition: threshold
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.host }} memory balloon at {{ $values.pct_ballooned.Value | printf \"%.1f\" }}% — host under memory pressure"
          panelUrl: "/d/VMwExHoV?orgId=1&viewPanel=16"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: vmware_host_mem_vmmemctl_average * 1024 / vmware_host_mem_capacity * 100 * on(hostmo,vcenter) group_left(host) vmware_host_info
              refId: A
          - refId: pct_ballooned
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_ballooned
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_ballooned
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
              refId: threshold

      - uid: vcenter-host-mem-swap
        title: vCenter Host Memory Swapping
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
        annotations:
          summary: "Host {{ $labels.host }} VMs are swapping to disk — {{ $values.pct_swapped.Value | printf \"%.1f\" }}% of memory swapped"
          panelUrl: "/d/VMwExHoV?orgId=1&viewPanel=16"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: vmware_host_mem_swapped_average * 1024 / vmware_host_mem_capacity * 100 * on(hostmo,vcenter) group_left(host) vmware_host_info
              refId: A
          - refId: pct_swapped
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_swapped
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_swapped
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 1
              refId: threshold

      - uid: vcenter-host-cpu-ready
        title: vCenter Host CPU Ready High
        condition: threshold
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.host }} CPU ready at {{ $values.pct_ready.Value | printf \"%.1f\" }}% — VMs waiting for CPU time"
          panelUrl: "/d/VMwExHoV?orgId=1&viewPanel=14"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: vmware_host_cpu_ready_summation / (20 * 1000) / vmware_host_cpu_corecount * 100 * on(hostmo,vcenter) group_left(host) vmware_host_info
              refId: A
          - refId: pct_ready
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_ready
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_ready
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
              refId: threshold

      - uid: vcenter-vm-powered-off
        title: VM Powered Off Unexpectedly
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "{{ $values.count.Value | printf \"%.0f\" }} VM(s) powered off — use platform suppression or Alertmanager silence to acknowledge known intentional shutdowns"
          panelUrl: "/d/vms?orgId=1&viewPanel=129"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'count(vcenter_vm_powered_off) or vector(0)'
              refId: A
          - refId: count
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: count
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: count
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: threshold

      - uid: vcenter-vm-backup-overdue
        title: VM Backup Overdue
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "{{ $values.count.Value | printf \"%.0f\" }} VM(s) have not been backed up in over 7 days — check the VM Backup Status dashboard"
          panelUrl: "/d/vm-backup-status?orgId=1&viewPanel=1"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'count(time() - vcenter_vm_last_backup_timestamp >= 604800) or vector(0)'
              refId: A
          - refId: count
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: count
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: count
              conditions:
