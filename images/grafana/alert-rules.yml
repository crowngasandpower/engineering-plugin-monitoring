                      - 1
              refId: threshold

      # Metric names and threshold require verification against Crown's UniFi exporter.
      # Threshold 100000000 = 100 MB/s = 80% of 1 Gbps symmetric; adjust for actual link speed.
      # Fires per-direction: Grafana evaluates RX and TX series independently.
      - uid: network-wan-utilisation
        title: WAN High Utilisation
        condition: threshold
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "WAN {{ $labels.direction }} throughput {{ $values.bytes_per_sec.Value | printf \"%.0f\" }} bytes/s — above 80% of link capacity"
