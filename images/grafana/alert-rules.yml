        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'label_replace(rate(unifi_wan_rx_bytes_total{job="unifi_local"}[5m]), "direction", "rx", "", "") or label_replace(rate(unifi_wan_tx_bytes_total{job="unifi_local"}[5m]), "direction", "tx", "", "")'
              refId: A
          - refId: bytes_per_sec
            relativeTimeRange:
              from: 0
              to: 0
