apiVersion: 1

templates:
  - orgId: 1
    name: platform_title
    template: |
      {{ define "default.title" -}}
      {{ if .Alerts.Firing -}}
      [{{ .CommonLabels.severity | toUpper }}] {{ .CommonLabels.alertname }}
      {{- else -}}
      [RESOLVED] {{ .CommonLabels.alertname }}
      {{- end }}
      {{- end }}

contactPoints:
  - orgId: 1
    name: PagerDuty
    receivers:
      - uid: pagerduty
        type: pagerduty
        settings:
          integrationKey: "${PAGERDUTY_PLATFORM_INTEGRATION_KEY}"
          severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
        disableResolveMessage: false
  - orgId: 1
    name: ErrorDiagnosisWebhook
    receivers:
      - uid: error-diagnosis-webhook
        type: webhook
        settings:
          url: http://error-diagnosis:3000/webhook/grafana
        disableResolveMessage: true

policies:
  - orgId: 1
    receiver: PagerDuty
    group_by:
      - grafana_folder
      - alertname
    group_wait: 0s
    group_interval: 1m
    repeat_interval: 4h
    routes:
      - receiver: ErrorDiagnosisWebhook
        matchers:
          - alertname = "Laravel Error Rate Spike"
        group_wait: 0s

# Severity convention:
#   warning  — low urgency in PagerDuty, no escalation
#   high     — low urgency in PagerDuty, no escalation
#              mapped to PagerDuty severity "warning" so urgency stays Low
#   critical — high urgency in PagerDuty, triggers escalation policy
#
# Maintenance windows: schedule in PagerDuty to suppress alerts during planned outages.
# Ad-hoc silencing: tray app Silence button calls Grafana silence API directly.
#
# Alert rule groups are NOT defined here.
# They are provisioned via the Grafana API by provision-alerts.py at container
# startup, reading from the alert-rules/ directory (one YAML file per group). This allows live UI editing in Grafana 13
# (file-provisioned rules are permanently locked in Grafana 13).
