apiVersion: 1

templates:
  - orgId: 1
    name: platform_title
    template: |
      {{ define "default.title" -}}
      [{{ .Status | toUpper }}:{{ len .Alerts.Firing }}] {{ .CommonLabels.alertname }}
      {{- end }}

contactPoints:
  - orgId: 1
    name: Error Diagnosis Webhook
    receivers:
      - uid: error-diagnosis-webhook
        type: webhook
        settings:
          url: "http://error-diagnosis:3000/webhook/grafana"
          httpMethod: POST
        disableResolveMessage: true

  - orgId: 1
    name: PagerDuty
    receivers:
      - uid: pagerduty
        type: pagerduty
        settings:
          integrationKey: "${PAGERDUTY_PLATFORM_INTEGRATION_KEY}"
          severity: critical
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: Error Diagnosis Webhook
    group_by:
      - grafana_folder
      - alertname
    routes:
      # oncall=Platform alerts escalate to PagerDuty after a 10-minute acknowledgment window.
      # Time-based routing (business-hours vs out-of-hours) should be configured in
      # PagerDuty's escalation policy — Grafana 13 removed active_time_intervals from
      # notification policy routes (muteTimes/mute_time_intervals still exists for silencing).
      - receiver: PagerDuty
        matchers:
          - oncall = Platform
        group_by:
          - grafana_folder
          - alertname
        group_wait: 10m
        group_interval: 5m
        repeat_interval: 4h

# Severity convention:
#   warning  — proactive, team-facing (disk >80%, cert <30d, etc.)   → desktop only
#   high     — serious degradation, service still up (disk >90%, etc.) → desktop only
#   critical — service down / loss of service                          → desktop + PagerDuty
#              requires oncall=Platform label to trigger PagerDuty route
#
# Alert rule groups are NOT defined here.
# They are provisioned via the Grafana API by provision-alerts.py at container
# startup, reading from alert-rules.yml. This allows live UI editing in Grafana 13
# (file-provisioned rules are permanently locked in Grafana 13).
