  - orgId: 1
    name: Supervisor Workers
    folder: Infrastructure Alerts
    interval: 1m
    rules:
      - uid: supervisor-worker-fatal
        title: Supervisor Worker FATAL
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: "Supervisor worker {{ $labels.app }}/{{ $labels.worker }} is FATAL on {{ $labels.host }} (auto-restart failed)"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: supervisor_worker_up{job="supervisor"} == 0
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.5
              refId: C

      - uid: supervisor-host-unreachable
        title: Supervisor Host Unreachable
        condition: C
        for: 10m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: "Cannot SSH to {{ $labels.host }} to check supervisor workers"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: supervisor_host_reachable{job="supervisor"}
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              refId: C

      - uid: supervisor-check-stale
        title: Supervisor Check Stale
        condition: C
        for: 15m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "Supervisor health check has not run for {{ $labels.host }} in over 15 minutes"
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: time() - supervisor_check_timestamp_seconds{job="supervisor"}
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 900
              refId: C

  - orgId: 1
    name: Application Errors
    folder: Infrastructure Alerts
    interval: 5m
    rules:
      - uid: laravel-error-rate-spike
        title: Laravel Error Rate Spike
        condition: C
        for: 5m
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
          sonos_alert: "true"
        annotations:
          summary: "Laravel error rate exceeded 100 in 5 minutes (deadlocks excluded)"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: P8E80F9AEF21F6940
            model:
              expr: 'sum(count_over_time({log_type="laravel"} |~ "(?i)error|exception|fatal" != "Serialization failure: 1213 Deadlock" [5m]))'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 100
              refId: C

  - orgId: 1
    name: Sonos Alerts
    folder: Infrastructure Alerts
    interval: 1m
    rules:
      - uid: cpu-usage-critical
        title: CPU Usage Over 95%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          sonos_alert: "true"
        annotations:
          summary: "CPU usage on {{ $labels.instance }} has exceeded 95%"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (1 - avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 95
              refId: C

      - uid: memory-usage-critical
        title: Memory Usage Over 85%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          sonos_alert: "true"
        annotations:
          summary: "Memory usage on {{ $labels.instance }} has exceeded 85%"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
              refId: C
