apiVersion: 1

contactPoints:
  - orgId: 1
    name: Error Diagnosis Webhook
    receivers:
      - uid: error-diagnosis-webhook
        type: webhook
        settings:
          url: "http://192.168.164.184:9524/webhook/grafana"
          httpMethod: POST
        disableResolveMessage: true
  - orgId: 1
    name: Sonos Alerts
    receivers:
      - uid: sonos-alerts-webhook
        type: webhook
        settings:
          url: "https://sonos.tools.cgp3.co.uk/webhook/grafana"
          httpMethod: POST
          authorization_scheme: Bearer
          authorization_credentials: "6MIcjHC5MDpuWFSGThqgmJbRShc66CzBPDRNij5Aw"
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: Error Diagnosis Webhook
    group_by:
      - grafana_folder
      - alertname
    routes:
      - receiver: Sonos Alerts
        group_by:
          - alertname
          - instance
        matchers:
          - sonos_alert=true
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 999h
        continue: true

groups:
  - orgId: 1
    name: Temperature
    folder: Infrastructure Alerts
    interval: 1m
    rules:
      - uid: server-intake-temp-warning
        title: Server Intake Temp Warning
        condition: C
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max(server_intake_temp_celsius)
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 29.5
              refId: C

      - uid: server-intake-temp-critical
        title: Server Intake Temp Critical
        condition: C
        for: 2m
