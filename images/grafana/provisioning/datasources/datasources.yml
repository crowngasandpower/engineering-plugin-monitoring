apiVersion: 1

datasources:
  - name: Prometheus
    uid: PBFA97CFB590B2093
    type: prometheus
    access: proxy
    url: http://prometheus.mcp.local:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: P8E80F9AEF21F6940
    type: loki
    access: proxy
    url: http://loki.mcp.local:3100
    isDefault: false
    editable: false

  - name: PostgreSQL
    uid: review-api-postgres
    type: postgres
    access: proxy
    url: crown-eng-mcp-db.cdga4g6a43lh.eu-west-2.rds.amazonaws.com:5432
    user: codereview
    secureJsonData:
      password: "${GF_POSTGRES_REVIEW_PASSWORD}"
    jsonData:
      database: codereview
      sslmode: require
    isDefault: false
    editable: false

  - name: PostgreSQL Monitoring
    uid: PCC52D03280B7034C
    type: postgres
    access: proxy
    url: 192.168.164.184:9508
    user: monitoring
    secureJsonData:
      password: monitoring
    jsonData:
      database: monitoring
      sslmode: disable
    isDefault: false
    editable: false

  # Infinity — queries JSON/CSV/HTTP APIs directly from a panel. Used by the
  # "Claude Status" panel on the Infrastructure dashboard to read the public
  # Claude status.json endpoint. access: proxy means Grafana's backend makes
  # the outbound call (server-side), so it needs egress to status.claude.com.
  - name: Claude Status (Infinity)
    uid: claude-status-infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    isDefault: false
    editable: false
    jsonData:
      allowedHosts:
        - https://status.claude.com
