# Alert rule group — provisioned by provision-alerts.py at container startup.
# One file per group; provision-alerts.py globs this directory and merges all
# `groups`. Edit the relevant group file and raise a PR. Mirror any change in
# the other stack's alert-rules/ dir (images/grafana <-> onprem/grafana).
groups:
  - orgId: 1
    name: HTTP
    folder: Applications
    interval: 1m
    rules:
      - uid: http-app-down
        title: Application HTTP Down
        condition: threshold
        for: 3m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
          oncall: Platform
        annotations:
          summary: "HTTP probe failing for {{ $labels.instance }} — application may be down"
          panelUrl: "/d/infrastructure?orgId=1&viewPanel=15"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'probe_success{job="blackbox"}'
              refId: A
          - refId: val
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: val
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: val
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              refId: threshold

      - uid: http-app-slow
        title: Application HTTP Slow Response
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} responding in {{ $values.duration_s.Value | printf \"%.2f\" }}s — above 3s threshold"
          panelUrl: "/d/infrastructure?orgId=1&viewPanel=15"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'probe_duration_seconds{job="blackbox"}'
              refId: A
          - refId: duration_s
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: duration_s
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: duration_s
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 3
              refId: threshold
