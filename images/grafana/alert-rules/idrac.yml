# Alert rule group — provisioned by provision-alerts.py at container startup.
# One file per group; provision-alerts.py globs this directory and merges all
# `groups`. Edit the relevant group file and raise a PR. Mirror any change in
# the other stack's alert-rules/ dir (images/grafana <-> onprem/grafana).
groups:
  - orgId: 1
    name: iDRAC
    folder: Hardware
    interval: 1m
    rules:
      # Warning only — Teams notification is sufficient; critical rule pages PagerDuty
      - uid: server-intake-temp-warning
        title: Server Intake Temp Warning
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "Server intake temperature elevated on {{ $labels.instance }}: {{ $values.temp_c.Value | printf \"%.1f\" }}°C (warning: 29.5°C, critical: 30°C)"
          panelUrl: "/d/server-room-temperature?orgId=1&viewPanel=5"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max by (instance)(idrac_sensors_temperature{name=~"Inlet Temp|System Board Inlet Temp"})
              refId: A
          - refId: temp_c
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: temp_c
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: temp_c
              conditions:
                - evaluator:
                    type: within_range
                    params:
                      - 29.5
                      - 30
              refId: threshold

      - uid: server-intake-temp-critical
        title: Server Intake Temp Critical
        condition: threshold
        for: 1m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          summary: "Server intake temperature critical on {{ $labels.instance }}: {{ $values.temp_c.Value | printf \"%.1f\" }}°C (threshold: 30°C)"
          panelUrl: "/d/server-room-temperature?orgId=1&viewPanel=5"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max by (instance)(idrac_sensors_temperature{name=~"Inlet Temp|System Board Inlet Temp"})
              refId: A
          - refId: temp_c
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: temp_c
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: temp_c
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 30
              refId: threshold

      # Individual subsystem health rules — each pages PagerDuty independently
      # so that a second failure (e.g. CPU degrades after a PSU is acknowledged)
      # creates a new incident rather than being masked by the acknowledged one.
      # The idrac-system-health composite below also pages PagerDuty and acts as
      # a catch-all for components not covered by individual rules (intrusion,
      # network subsystem, power redundancy, etc.).
      - uid: idrac-cpu-health
        title: iDRAC CPU Health Degraded
        condition: threshold
        for: 1m
        noDataState: OK
        execErrState: Error
