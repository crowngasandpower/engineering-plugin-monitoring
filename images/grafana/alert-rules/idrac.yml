          summary: "System health degraded on {{ $labels.instance }}.{{ with $values.cpu }}{{ if gt .Value 0.0 }} CPU unhealthy.{{ end }}{{ end }}{{ with $values.psu }}{{ if gt .Value 0.0 }} PSU unhealthy.{{ end }}{{ end }}{{ with $values.fan }}{{ if gt .Value 0.0 }} Fan unhealthy.{{ end }}{{ end }}{{ with $values.stor }}{{ if gt .Value 0.0 }} Storage unhealthy.{{ end }}{{ end }}{{ with $values.mem }}{{ if gt .Value 0.0 }} Memory unhealthy.{{ end }}{{ end }} Check iDRAC console for full details."
