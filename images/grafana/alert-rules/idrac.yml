          summary: "CPU health degraded on {{ $labels.instance }}"
          panelUrl: "/d/idrac-crown?orgId=1&viewPanel=4"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: max by (instance)(idrac_cpu_health)
              refId: A
          - refId: health
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: health
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: health
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: threshold

      - uid: idrac-psu-health
        title: iDRAC PSU Health Degraded
