# Alert rule group — provisioned by provision-alerts.py at container startup.
# One file per group; provision-alerts.py globs this directory and merges all
# `groups`. Edit the relevant group file and raise a PR. Mirror any change in
# the other stack's alert-rules/ dir (images/grafana <-> onprem/grafana).
groups:
  - orgId: 1
    name: Certificates
    folder: Platform
    interval: 5m
    rules:
      - uid: cert-expiring-soon
        title: Certificate Expiring Soon
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "Certificate {{ $labels.name }} expiring in {{ $values.days.Value | printf \"%.0f\" }} days (warning: <30d, critical: <3d)"
          panelUrl: "/d/cert-mon?orgId=1&viewPanel=30"
          description: "{{ $labels.name }} ({{ $labels.instance }}) expires on {{ $labels.not_after }}"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: '(probe_ssl_earliest_cert_expiry{job="cert_probe"} - time()) / 86400'
              refId: A
          - refId: days
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: days
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: days
              conditions:
                - evaluator:
                    type: within_range
                    params:
                      - 3
                      - 30
              refId: threshold

      - uid: cert-expired
        title: Certificate Expired
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: Platform
        annotations:
          summary: "Certificate has expired: {{ $labels.name }} ({{ $labels.instance }})"
          panelUrl: "/d/cert-mon?orgId=1&viewPanel=30"
          description: "{{ $labels.name }} expired on {{ $labels.not_after }} — services using this certificate will fail TLS handshakes"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: '(probe_ssl_earliest_cert_expiry{job="cert_probe"} - time()) / 86400'
              refId: A
          - refId: days
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: days
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: days
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 0
              refId: threshold

      - uid: cert-expiring-critical
        title: Certificate Expiring — Critical
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: Platform
        annotations:
          summary: "Certificate {{ $labels.name }} expiring in {{ $values.days.Value | printf \"%.0f\" }} days — less than 3 days remaining"
          panelUrl: "/d/cert-mon?orgId=1&viewPanel=30"
          description: "{{ $labels.name }} ({{ $labels.instance }}) expires on {{ $labels.not_after }}"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: '(probe_ssl_earliest_cert_expiry{job="cert_probe"} - time()) / 86400'
              refId: A
          - refId: days
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: days
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: days
              conditions:
                - evaluator:
                    type: within_range
                    params:
                      - 0
                      - 3
              refId: threshold

      - uid: cert-probe-failure
        title: Certificate Probe Failed
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "TLS probe failed for {{ $labels.name }}"
          panelUrl: "/d/cert-mon?orgId=1&viewPanel=50"
          description: "Blackbox cannot complete a TLS handshake to {{ $labels.instance }} — cert may be unreachable or misconfigured"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'probe_success{job="cert_probe"}'
              refId: A
          - refId: success
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: success
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: success
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              refId: threshold

      - uid: cert-revoked
        title: Certificate Revoked
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: Platform
        annotations:
          summary: "Certificate revoked: {{ $labels.name }}"
          panelUrl: "/d/cert-mon?orgId=1&viewPanel=40"
          description: "OCSP check reports {{ $labels.name }} ({{ $labels.url }}) as revoked — immediate action required"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'cert_ocsp_status{job="cert_custom"} == 1'
              refId: A
          - refId: status
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: status
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: status
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: threshold

      - uid: cert-weak-signature
        title: Certificate Uses Weak Signature (SHA-1)
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "Weak certificate signature: {{ $labels.name }}"
          panelUrl: "/d/cert-mon?orgId=1&viewPanel=41"
          description: "{{ $labels.name }} ({{ $labels.url }}) uses SHA-1 or MD5 — should be replaced with a SHA-256 certificate"
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 'cert_chain_has_sha1{job="cert_custom"}'
              refId: A
          - refId: val
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: val
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: val
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: threshold
