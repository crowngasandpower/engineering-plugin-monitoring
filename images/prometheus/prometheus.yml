global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['192.168.164.184:9501']

  # Rust pricing worker on k3s — scraped via its MetalLB/traefik ingress (valid LE cert).
  - job_name: 'rustpricing'
    scheme: https
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['rust-pricing.apps.cgp3.co.uk']

  - job_name: 'genus'
    scrape_interval: 30s
    static_configs:
      - targets: ['192.168.164.184:9507']

  # Weather exporter — outside temperature for the server-room dashboards.
  # The on-prem compose maps weather-exporter 9522:3000 (9520 was taken by
  # crown-mcp-diff-harness-api).
  - job_name: 'weather'
    scrape_interval: 60s
    scrape_timeout: 15s
    static_configs:
      - targets: ['192.168.164.184:9522']

  - job_name: 'node'
    scrape_interval: 15s
    static_configs:
      - targets: ['apps-prod-1']
        labels:
          host: apps-prod-1
      - targets: ['apps-prod-2']
        labels:
          host: apps-prod-2
      - targets: ['apps-prod-mysql']
        labels:
          host: apps-prod-mysql
      - targets: ['eps-worker-1']
        labels:
          host: eps-worker-1
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__address__]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /$1/node/metrics
      - target_label: __address__
        replacement: 192.168.164.184:9550

  - job_name: 'vmware'
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets: ['192.168.164.184:9515']

  - job_name: 'idrac'
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets:
        - hq-dc-svr1-r660-idrac.crowngp.local
        - hq-dc-svr2-r660-idrac.crowngp.local
        - hq-dc-svr3-r660-idrac.crowngp.local
        - hq-dc-svr4-r540-idrac.crowngp.local
        - hq-dc-svr5-r540-idrac.crowngp.local
        - hq-dc-svr6-r540-idrac.crowngp.local
        - hq-dc-svr7-r660-idrac.crowngp.local
        - hq-dc-svr8-r750xs-idrac.crowngp.local
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.164.184:9516

  - job_name: 'powerstore_cluster'
