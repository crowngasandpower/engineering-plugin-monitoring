global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: 'grafana'
    scrape_interval: 30s
    static_configs:
      - targets: ['grafana.mcp.local:3000']

  # Scrapes Grafana's built-in Prometheus ruler to expose the ALERTS metric
  # with full rule labels (severity, alertname, etc.) so dashboards can split
  # by severity via PromQL.
  - job_name: 'grafana-alerts'
    honor_labels: true
    metrics_path: /api/prometheus/grafana/federate
    params:
      match[]:
        - 'ALERTS'
    scrape_interval: 30s
    static_configs:
      - targets: ['grafana.mcp.local:3000']
    basic_auth:
      username: admin
      credentials_file: /run/prometheus/grafana-credentials


  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['192.168.164.184:9501']

  # Rust pricing worker (k3s, .195 subnet). The AWS Prometheus can't route .195
  # directly, so it's pulled through the on-prem metrics-proxy (:9550) — same
  # pattern as the node/nginx/phpfpm exporters below. The proxy location
  # forwards to the worker's HTTPS ingress. See onprem/metrics-proxy-nginx.conf.
  - job_name: 'rustpricing'
    scrape_interval: 15s
    metrics_path: /rust-pricing/metrics
    static_configs:
      - targets: ['192.168.164.184:9550']
        labels:
          instance: rust-pricing-worker

  - job_name: 'genus'
    scrape_interval: 30s
    static_configs:
      - targets: ['192.168.164.184:9507']

  # Docker container metrics — Alloy on poc-containers scrapes cAdvisor and
  # remote_writes to the on-prem prometheus-relay (:9528). AWS Prometheus
  # federates from the relay over the VPN (same path as :9550 scrapes).
  # prometheus.mcp.local is NXDOMAIN from on-prem so direct remote_write
  # from Alloy to AWS is not possible without DNS/ALB changes.
  - job_name: 'cadvisor'
    scrape_interval: 60s
    honor_labels: true
    metrics_path: /federate
    params:
      'match[]':
        - '{job="integrations/cadvisor"}'
    static_configs:
      - targets: ['192.168.164.184:9528']

  # Weather exporter — Open-Meteo polled per scrape. Hit rate at 60s is
  # 1,440/day/location, comfortably under the 10k/day free-tier cap.
  - job_name: 'weather'
    scrape_interval: 60s
    scrape_timeout: 15s
    static_configs:
      - targets: ['192.168.164.184:9522']

  # Linux node exporters — targets discovered dynamically by vcenter-sd.
  # Scrapes are routed through the metrics proxy at :9550 which resolves FQDNs
  # via DNS and proxies to each host's :9100.
  - job_name: 'node'
    scrape_interval: 15s
    http_sd_configs:
      - url: http://192.168.164.184:9529/vcenter/linux-targets
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      # Strip .crowngp.local suffix so instance label stays short (apps-prod-1 not apps-prod-1.crowngp.local)
      - source_labels: [instance]
        regex: '^([^.]+)\.crowngp\.local$'
        target_label: instance
        replacement: '$1'
      - source_labels: [__address__]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /$1/node/metrics
      - target_label: __address__
        replacement: 192.168.164.184:9550

  # Windows exporters — targets discovered dynamically by vcenter-sd.
  # Routed through metrics proxy at :9550 which proxies to each host's :9182.
  - job_name: 'windows'
    scrape_interval: 30s
    scrape_timeout: 25s
    http_sd_configs:
      - url: http://192.168.164.184:9529/vcenter/windows-targets
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      # Strip .crowngp.local suffix so instance label stays short
      - source_labels: [instance]
        regex: '^([^.]+)\.crowngp\.local$'
        target_label: instance
        replacement: '$1'
      - source_labels: [__address__]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /$1/windows/metrics
      - target_label: __address__
        replacement: 192.168.164.184:9550

  - job_name: 'vmware'
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets: ['192.168.164.184:9515']

  - job_name: 'idrac'
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets:
        - hq-dc-svr1-r660-idrac.crowngp.local
        - hq-dc-svr2-r660-idrac.crowngp.local
        - hq-dc-svr3-r660-idrac.crowngp.local
        - hq-dc-svr4-r540-idrac.crowngp.local
        - hq-dc-svr5-r540-idrac.crowngp.local
        - hq-dc-svr6-r540-idrac.crowngp.local
        - hq-dc-svr7-r660-idrac.crowngp.local
        - hq-dc-svr8-r750xs-idrac.crowngp.local
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.164.184:9516

  # PowerStore — one job per metric category. Static targets; all 4 SANs scrape
