      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [name]
        target_label: name
      - source_labels: [team]
        target_label: team
      - target_label: __address__
        replacement: 192.168.164.184:9514

  # Certificate monitoring — OCSP revocation, chain validation, cert metadata.
