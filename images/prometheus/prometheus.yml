global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  - job_name: 'genus'
    scrape_interval: 30s
    static_configs:
      - targets: ['genus-monitor:3000']

  # Weather exporter — Open-Meteo polled per scrape. Hit rate at 60s is
  # 1,440/day/location, comfortably under the 10k/day free-tier cap.
  - job_name: 'weather'
    scrape_interval: 60s
    scrape_timeout: 15s
    static_configs:
      - targets: ['weather-exporter:3000']

  - job_name: 'cadvisor'
    scrape_interval: 15s
    file_sd_configs:
      - files: ['/etc/prometheus/sd/cadvisor-hosts.json']
        refresh_interval: 30s

  - job_name: 'node'
    scrape_interval: 15s
    http_sd_configs:
      - url: http://exemption-api:8000/vcenter/linux-targets
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      # Strip .crowngp.local suffix so instance label stays short (apps-prod-1 not apps-prod-1.crowngp.local)
      - source_labels: [instance]
        regex: '^([^.]+)\.crowngp\.local$'
        target_label: instance
        replacement: '$1'
      - source_labels: [__address__]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /$1/node/metrics
      - target_label: __address__
        replacement: 192.168.164.184:9550

  - job_name: 'windows'
    scrape_interval: 30s
    http_sd_configs:
      - url: http://exemption-api:8000/vcenter/windows-targets
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      # Strip .crowngp.local suffix so instance label stays short
      - source_labels: [instance]
        regex: '^([^.]+)\.crowngp\.local$'
        target_label: instance
        replacement: '$1'
      - source_labels: [__address__]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /$1/windows/metrics
      - target_label: __address__
        replacement: 192.168.164.184:9550

  - job_name: 'vmware'
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets: ['vmware-exporter:9169']

  - job_name: 'idrac'
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets:
        - hq-dc-svr1-r660-idrac.crowngp.local
        - hq-dc-svr2-r660-idrac.crowngp.local
        - hq-dc-svr3-r660-idrac.crowngp.local
        - hq-dc-svr4-r540-idrac.crowngp.local
        - hq-dc-svr5-r540-idrac.crowngp.local
        - hq-dc-svr6-r540-idrac.crowngp.local
        - hq-dc-svr7-r660-idrac.crowngp.local
        - hq-dc-svr8-r750xs-idrac.crowngp.local
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: idrac-exporter:9348

  # PowerStore — SD file written by powerstore-exporter at startup.
  # To add a new SAN: set POWERSTORE_N_* in .env and restart powerstore-exporter.
  # Prometheus picks up the updated file within 30 seconds, no restart needed.
  - job_name: 'powerstore_cluster'
    scrape_interval: 15m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/cluster'

  - job_name: 'powerstore_appliance'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/appliance'

  - job_name: 'powerstore_capacity'
    scrape_interval: 15m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/capacity'

  - job_name: 'powerstore_hardware'
    scrape_interval: 10m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/hardware'

  - job_name: 'powerstore_volume'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/volume'

  - job_name: 'powerstore_volumeGroup'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/volumeGroup'

  - job_name: 'powerstore_port'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/port'

  - job_name: 'powerstore_nas'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/nas'

  - job_name: 'powerstore_file'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/file'

  - job_name: 'powerstore_alert'
    scrape_interval: 1m
    scrape_timeout: 30s
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/alert'

  - job_name: 'mysql'
    scrape_interval: 15s
    metrics_path: /apps-prod-mysql/mysql/metrics
    static_configs:
      - targets: ['192.168.164.184:9550']
        labels:
          host: apps-prod-mysql

  # UniFi Site Manager — fleet overview via api.ui.com
  - job_name: 'unifi'
    scrape_interval: 60s
    scrape_timeout: 30s
    static_configs:
      - targets: ['unifi-exporter:3000']

  # UniFi local controllers — per-device metrics via direct API
  - job_name: 'unifi_local'
    scrape_interval: 60s
    scrape_timeout: 45s
    static_configs:
      - targets: ['unifi-local-exporter:3000']

  # Dell OS10 switches — RESTCONF API
  - job_name: 'dell_os10'
    scrape_interval: 60s
    scrape_timeout: 30s
    static_configs:
      - targets: ['dell-os10-exporter:3000']

  # Certificate monitoring — TLS expiry via blackbox https_cert module.
  # Targets managed via http://poc-containers:9511/cert
  - job_name: 'cert_probe'
    metrics_path: /probe
    params:
      module: [https_cert]
    scrape_interval: 5m
    scrape_timeout: 30s
    http_sd_configs:
      - url: http://exemption-api:8000/cert/targets
        refresh_interval: 1m
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [name]
        target_label: name
      - source_labels: [team]
        target_label: team
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Certificate monitoring — OCSP revocation, chain validation, cert metadata.
  - job_name: 'cert_custom'
    scrape_interval: 5m
    scrape_timeout: 4m
    metrics_path: /cert/metrics
    static_configs:
      - targets: ['exemption-api:8000']

  # UniFi device exemptions — managed via http://poc-containers:9511/suppress
  - job_name: 'unifi_exempt'
    scrape_interval: 60s
    metrics_path: /unifi/metrics
    static_configs:
      - targets: ['exemption-api:8000']

  # Ping target registry — exposes configured targets as a gauge so the
  # dashboard can show them as DOWN before a site script has pushed any data.
  - job_name: 'ping_targets_config'
    scrape_interval: 30s
    metrics_path: /ping/metrics
    static_configs:
      - targets: ['exemption-api:8000']

  # Ad-hoc connectivity checks — managed via http://poc-containers:9511/connectivity
  - job_name: 'connectivity_check'
    metrics_path: /probe
    params:
      module: [icmp]
    scrape_interval: 60s
    scrape_timeout: 10s
    http_sd_configs:
      - url: http://exemption-api:8000/connectivity/targets
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Ping targets — managed via http://poc-containers:9511/ping
  - job_name: 'ping_targets'
    metrics_path: /probe
    params:
      module: [icmp]
    scrape_interval: 60s
    scrape_timeout: 10s
    http_sd_configs:
      - url: http://exemption-api:8000/ping/targets
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    scrape_interval: 30s
    static_configs:
      - targets:
          - https://billy.apps.crown
          - https://ces-elec.apps.crown
          - https://cva-dataflow-validation.apps.crown
          - https://dds.apps.crown
          - https://dds-elec.apps.crown
          - https://doc-master.apps.crown
          - https://doc-master-elec.apps.crown
          - https://eps.apps.crown
          - https://esema.apps.crown
          - https://gateway.apps.crown
          - https://gateway-elec.apps.crown
          - https://jigsaw-elec.apps.crown
          - https://multisite-manager.apps.crown
          - https://pims.apps.crown
          - https://pims-elec.apps.crown
          - https://portal-gas-admin.apps.crown
          - https://portal-power-admin.apps.crown
          - https://sanctions.apps.crown
          - https://settlements-elec.apps.crown
          - https://wolfy-elec.apps.crown
          - https://aerio.apps.crown
          - https://ces.apps.crown
          - https://complaintstracker.apps.crown
          - https://gps.apps.crown
          - https://jigsaw.apps.crown
          - https://meter-data-manager.apps.crown
          - https://reporting.apps.crown
          - https://revenue-dollar.apps.crown
          - https://revenue-dollar-elec.apps.crown
          - https://settlements.apps.crown
          - https://synergy.apps.crown
          - https://wolfy.apps.crown
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: https://([^.]+)\.apps\.crown
        target_label: app
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: nginx
    static_configs:
      - targets: ['apps-prod-1']
        labels:
          host: apps-prod-1
      - targets: ['apps-prod-2']
        labels:
          host: apps-prod-2
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__address__]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /$1/nginx/metrics
      - target_label: __address__
        replacement: 192.168.164.184:9550

  - job_name: phpfpm
    static_configs:
      - targets: ['apps-prod-1']
        labels:
          host: apps-prod-1
      - targets: ['apps-prod-2']
        labels:
          host: apps-prod-2
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__address__]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /$1/phpfpm/metrics
      - target_label: __address__
        replacement: 192.168.164.184:9550

  - job_name: 'blackbox-aws'
    metrics_path: /probe
    params:
      module: [http_2xx]
    scrape_interval: 30s
    static_configs:
      - targets:
          - https://econtracts.crowngasandpower.co.uk
          - https://econtracts-power.crowngasandpower.co.uk
          - https://ewelcome.crowngasandpower.co.uk
          - https://ewelcome-power.crowngasandpower.co.uk
          - https://portal-gas.crowngasandpower.co.uk
          - https://portal-power.crowngasandpower.co.uk
          - https://portal-auth.crowngasandpower.co.uk
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: https://([^.]+)\.crowngasandpower\.co\.uk
        target_label: app
      - target_label: __address__
        replacement: blackbox-exporter:9115
