global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  - job_name: 'ping_targets_config'
    scrape_interval: 30s
    metrics_path: /ping/metrics
    static_configs:
      - targets: ['exemption-api:8000']

  - job_name: 'genus'
    scrape_interval: 30s
    static_configs:
      - targets: ['genus-monitor:3000']

  # Weather exporter — Open-Meteo polled per scrape. Hit rate at 60s is
  # 1,440/day/location, comfortably under the 10k/day free-tier cap.
  - job_name: 'weather'
    scrape_interval: 60s
    scrape_timeout: 15s
    static_configs:
      - targets: ['weather-exporter:3000']

  - job_name: 'cadvisor'
    scrape_interval: 15s
    file_sd_configs:
      - files: ['/etc/prometheus/sd/cadvisor-hosts.json']
        refresh_interval: 30s

  - job_name: 'node'
    scrape_interval: 60s
    scrape_timeout: 30s
    file_sd_configs:
      - files: ['/etc/prometheus/sd/linux-hosts.json']
        refresh_interval: 30s

  - job_name: 'windows'
    scrape_interval: 15s
    file_sd_configs:
      - files: ['/etc/prometheus/sd/windows-hosts.json']
        refresh_interval: 30s

  - job_name: 'vmware'
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets: ['vmware-exporter:9169']

  - job_name: 'idrac'
    scrape_interval: 60s
    scrape_timeout: 55s
    static_configs:
      - targets:
        - hq-dc-svr1-r660-idrac.crowngp.local
        - hq-dc-svr2-r660-idrac.crowngp.local
        - hq-dc-svr3-r660-idrac.crowngp.local
        - hq-dc-svr4-r540-idrac.crowngp.local
        - hq-dc-svr5-r540-idrac.crowngp.local
        - hq-dc-svr6-r540-idrac.crowngp.local
        - hq-dc-svr7-r660-idrac.crowngp.local
        - hq-dc-svr8-r750xs-idrac.crowngp.local
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: idrac-exporter:9348

  # PowerStore — one job per metric category.
  # Targets are auto-discovered from /etc/prometheus/sd/powerstore.json,
  # generated by the powerstore-exporter container on startup.
  # To add a new SAN: set POWERSTORE_2_* in .env and restart powerstore-exporter.
  # Prometheus picks up the updated SD file within 30 seconds, no restart needed.
  - job_name: 'powerstore_cluster'
    scrape_interval: 15m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/cluster'

  - job_name: 'powerstore_appliance'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/appliance'

  - job_name: 'powerstore_capacity'
    scrape_interval: 15m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/capacity'

  - job_name: 'powerstore_hardware'
    scrape_interval: 10m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/hardware'

  - job_name: 'powerstore_volume'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/volume'

  - job_name: 'powerstore_volumeGroup'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/volumeGroup'

  - job_name: 'powerstore_port'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/port'

  - job_name: 'powerstore_nas'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/nas'

  - job_name: 'powerstore_file'
    scrape_interval: 5m
    scrape_timeout: 3m
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/file'

  - job_name: 'powerstore_alert'
    scrape_interval: 1m
    scrape_timeout: 30s
    file_sd_configs:
      - files: ['/etc/prometheus/sd/powerstore.json']
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [array_ip]
        regex: (.+)
        target_label: __metrics_path__
        replacement: '/metrics/$1/alert'

  - job_name: 'mysql'
    scrape_interval: 15s
    static_configs:
      - targets: ['apps-prod-mysql:9104']
        labels:
          host: apps-prod-mysql

  # UniFi Site Manager — single scrape pulls all consoles via api.ui.com.
  # Provides fleet overview and acts as a watchdog: if this shows a site online
  # but unifi_local metrics go dark, the SDWAN link to that site is down.
  # 60s interval keeps well within the UI.com API rate limits.
  - job_name: 'unifi'
    scrape_interval: 60s
    scrape_timeout: 30s
    static_configs:
      - targets: ['unifi-exporter:3000']

  # UniFi local controller API — connects directly to each EFG / UDM Pro Max
  # via SDWAN using per-controller API keys. Provides per-device, per-port,
  # per-radio, and WAN metrics that the Site Manager API cannot expose.
  - job_name: 'unifi_local'
    scrape_interval: 60s
    scrape_timeout: 45s
    static_configs:
      - targets: ['unifi-local-exporter:3000']

  # Dell OS10 switches — RESTCONF API polled per scrape (4 switches in parallel).
  - job_name: 'dell_os10'
    scrape_interval: 60s
    scrape_timeout: 30s
    static_configs:
      - targets: ['dell-os10-exporter:3000']

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    scrape_interval: 30s
    static_configs:
      - targets:
          # apps-prod-1
          - https://billy.apps.crown
          - https://ces-elec.apps.crown
          - https://cva-dataflow-validation.apps.crown
          - https://dds.apps.crown
          - https://dds-elec.apps.crown
          - https://doc-master.apps.crown
          - https://doc-master-elec.apps.crown
          - https://eps.apps.crown
          - https://esema.apps.crown
          - https://gateway.apps.crown
          - https://gateway-elec.apps.crown
          - https://jigsaw-elec.apps.crown
          - https://multisite-manager.apps.crown
          - https://pims.apps.crown
          - https://pims-elec.apps.crown
          - https://portal-gas-admin.apps.crown
          - https://portal-power-admin.apps.crown
          - https://sanctions.apps.crown
          - https://settlements-elec.apps.crown
          - https://wolfy-elec.apps.crown
          # apps-prod-2
          - https://aerio.apps.crown
          - https://ces.apps.crown
          - https://complaintstracker.apps.crown
          - https://gps.apps.crown
          - https://jigsaw.apps.crown
          - https://meter-data-manager.apps.crown
          - https://reporting.apps.crown
          - https://revenue-dollar.apps.crown
          - https://revenue-dollar-elec.apps.crown
          - https://settlements.apps.crown
          - https://synergy.apps.crown
          - https://wolfy.apps.crown
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: https://([^.]+)\.apps\.crown
        target_label: app
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Certificate monitoring — TLS expiry via blackbox https_cert module.
  # Targets managed via http://poc-containers:9511/cert
  - job_name: 'cert_probe'
    metrics_path: /probe
    params:
      module: [https_cert]
    scrape_interval: 5m
    scrape_timeout: 30s
    http_sd_configs:
      - url: http://exemption-api:8000/cert/targets
        refresh_interval: 1m
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [name]
        target_label: name
      - source_labels: [team]
        target_label: team
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Certificate monitoring — OCSP revocation, chain validation, cert metadata.
  - job_name: 'cert_custom'
    scrape_interval: 5m
    scrape_timeout: 4m
    metrics_path: /cert/metrics
    static_configs:
      - targets: ['exemption-api:8000']
