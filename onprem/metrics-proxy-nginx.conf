events { worker_connections 64; }

http {
    # Required for proxy_pass with a variable (dynamic routing below).
    # 127.0.0.11 is Docker's embedded resolver — it forwards to the host's DNS.
    # On poc-containers the host DNS must resolve .crowngp.local (AD DC).
    # If dynamic routes return 502, check: docker exec monitoring-metrics-proxy
    # nslookup apps-prod-1.crowngp.local 127.0.0.11
    # If that fails, replace 127.0.0.11 with the DC IP from /etc/resolv.conf.
    resolver 127.0.0.11 valid=30s;

    server {
        listen 9550;

        # Static routes — ^~ takes priority over the regex catch-alls below.
        # Both short-name and FQDN variants are listed: Prometheus now sends FQDN paths
        # (apps-prod-1.crowngp.local) but the short-name entries are kept so any legacy
        # scrape jobs that still use bare hostnames continue to work without DNS.
        # Node exporters (:9100)
        location ^~ /apps-prod-1/node/                  { proxy_pass http://192.168.164.252:9100/; }
        location ^~ /apps-prod-1.crowngp.local/node/    { proxy_pass http://192.168.164.252:9100/; }
        location ^~ /apps-prod-2/node/                  { proxy_pass http://192.168.164.207:9100/; }
        location ^~ /apps-prod-2.crowngp.local/node/    { proxy_pass http://192.168.164.207:9100/; }
        location ^~ /apps-prod-mysql/node/               { proxy_pass http://192.168.164.206:9100/; }
        location ^~ /apps-prod-mysql.crowngp.local/node/ { proxy_pass http://192.168.164.206:9100/; }
        location ^~ /eps-worker-1/node/                  { proxy_pass http://192.168.164.40:9100/;  }
        location ^~ /eps-worker-1.crowngp.local/node/    { proxy_pass http://192.168.164.40:9100/;  }
        location ^~ /apps-swarm-1/node/                  { proxy_pass http://192.168.164.67:9100/;  }
        location ^~ /apps-swarm-1.crowngp.local/node/    { proxy_pass http://192.168.164.67:9100/;  }

        # MySQL exporter (:9104)
        location ^~ /apps-prod-mysql/mysql/ { proxy_pass http://192.168.164.206:9104/; }

        # Nginx exporters (:9113)
        location ^~ /apps-prod-1/nginx/ { proxy_pass http://192.168.164.252:9113/; }
        location ^~ /apps-prod-2/nginx/ { proxy_pass http://192.168.164.207:9113/; }

        # PHP-FPM exporters (:9253)
        location ^~ /apps-prod-1/phpfpm/ { proxy_pass http://192.168.164.252:9253/; }
        location ^~ /apps-prod-2/phpfpm/ { proxy_pass http://192.168.164.207:9253/; }

        # Dynamic catch-all — hostname extracted from path, resolved via DNS at request time.
        # Handles vcenter-discovered hosts (FQDNs like host.crowngp.local) that are not
        # in the static list above.
        location ~ ^/([a-zA-Z][a-zA-Z0-9._-]*)/node/metrics$    { set $b http://$1:9100/metrics;  proxy_pass $b; }
        location ~ ^/([a-zA-Z][a-zA-Z0-9._-]*)/windows/metrics$ { set $b http://$1:9182/metrics; proxy_pass $b; }
    }

    # Loki push proxy — forwards log writes from on-prem Promtail to AWS Loki
    server {
        listen 9551;

        location /loki/api/v1/push {
            proxy_pass https://tools.cgp3.co.uk;
            proxy_set_header Host tools.cgp3.co.uk;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            client_max_body_size 10m;
        }

        location /ready {
            return 200 "ok";
        }
    }
}
