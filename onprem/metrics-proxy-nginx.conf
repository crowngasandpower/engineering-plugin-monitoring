events { worker_connections 64; }

http {
    server {
        listen 9550;

        # Node exporters (:9100)
        location /apps-prod-1/node/     { proxy_pass http://192.168.164.252:9100/; }
        location /apps-prod-2/node/     { proxy_pass http://192.168.164.207:9100/; }
        location /apps-prod-mysql/node/ { proxy_pass http://192.168.164.206:9100/; }
        location /eps-worker-1/node/    { proxy_pass http://192.168.164.40:9100/;  }

        # MySQL exporter (:9104)
        location /apps-prod-mysql/mysql/ { proxy_pass http://192.168.164.206:9104/; }

        # Nginx exporters (:9113)
        location /apps-prod-1/nginx/ { proxy_pass http://192.168.164.252:9113/; }
        location /apps-prod-2/nginx/ { proxy_pass http://192.168.164.207:9113/; }

        # PHP-FPM exporters (:9253)
        location /apps-prod-1/phpfpm/ { proxy_pass http://192.168.164.252:9253/; }
        location /apps-prod-2/phpfpm/ { proxy_pass http://192.168.164.207:9253/; }

        # Rust pricing worker (k3s ingress on the .195 subnet, HTTPS, routed by
        # Host/SNI). The AWS Prometheus can't route .195 directly, so it pulls
        # this path over the VPN and we forward to the worker. Variable +
        # resolver forces runtime DNS (the MetalLB VIP can move); proxy_ssl
        # verification is off (internal cert).
        location = /rust-pricing/metrics {
            resolver 192.168.164.197 192.168.164.223 valid=30s ipv6=off;
            set $rust_worker "rust-pricing.apps.cgp3.co.uk";
            proxy_pass https://$rust_worker/metrics;
            proxy_set_header Host rust-pricing.apps.cgp3.co.uk;
            proxy_ssl_server_name on;
            proxy_read_timeout 20s;
        }
    }

    # Loki push proxy — forwards log writes from on-prem Promtail to AWS Loki
    server {
        listen 9551;

        location /loki/api/v1/push {
            # Re-resolve the ALB hostname at runtime. A proxy_pass with a
            # literal hostname is resolved ONCE at startup and cached for the
            # life of the process; when the tools.cgp3.co.uk ALB rotates its
            # IPs (it does, every few days) the cached IP goes stale and the
            # stale endpoint silently black-holes pushes — nginx returns 200
            # but Loki never ingests, so all app logs vanish. A resolver (the
            # host's on-prem DNS) + a variable in proxy_pass forces nginx to
            # re-resolve (valid=30s), so an IP rotation self-heals. We use the
            # explicit on-prem nameservers rather than Docker's embedded
            # 127.0.0.11 so this works whether the container runs on the legacy
            # `bridge` network (no embedded DNS) or a compose user-defined one.
            resolver 192.168.164.197 192.168.164.223 valid=30s ipv6=off;
            set $loki_alb "tools.cgp3.co.uk";
            proxy_pass https://$loki_alb$request_uri;
            proxy_set_header Host tools.cgp3.co.uk;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            client_max_body_size 10m;
        }

        location /ready {
            return 200 "ok";
        }
    }
}
