---
- name: Map ansible_architecture to node_exporter arch
  ansible.builtin.set_fact:
    node_exporter_arch: >-
      {{ {'x86_64': 'amd64',
          'aarch64': 'arm64',
          'armv7l': 'armv7'}[ansible_architecture] }}
  failed_when: ansible_architecture not in ['x86_64', 'aarch64', 'armv7l']

- name: Set release name
  ansible.builtin.set_fact:
    node_exporter_release: "node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}"

- name: Check installed version
  ansible.builtin.command: "{{ node_exporter_bin }} --version"
  register: node_exporter_installed
  changed_when: false
  failed_when: false

- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups: systemd-journal
    append: true

- name: Download and unpack node_exporter
  when: node_exporter_version not in (node_exporter_installed.stdout | default(''))
  block:
    - name: Create temp dir
      ansible.builtin.tempfile:
        state: directory
        suffix: node_exporter
      register: node_exporter_tmp

    - name: Download release tarball
      ansible.builtin.get_url:
        url: "{{ node_exporter_download_base }}/v{{ node_exporter_version }}/{{ node_exporter_release }}.tar.gz"
        dest: "{{ node_exporter_tmp.path }}/{{ node_exporter_release }}.tar.gz"
        mode: "0644"

    - name: Unpack tarball
      ansible.builtin.unarchive:
        src: "{{ node_exporter_tmp.path }}/{{ node_exporter_release }}.tar.gz"
        dest: "{{ node_exporter_tmp.path }}"
        remote_src: true

    - name: Install binary
      ansible.builtin.copy:
        src: "{{ node_exporter_tmp.path }}/{{ node_exporter_release }}/node_exporter"
        dest: "{{ node_exporter_bin }}"
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Restart node_exporter
  always:
    - name: Clean up temp dir
      ansible.builtin.file:
        path: "{{ node_exporter_tmp.path }}"
        state: absent
      when: node_exporter_tmp.path is defined

- name: Write systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true

- name: Verify metrics endpoint responds
  ansible.builtin.uri:
    url: "http://127.0.0.1{{ node_exporter_listen_address }}/metrics"
    method: GET
    status_code: 200
  register: node_exporter_probe
  retries: 5
  delay: 2
  until: node_exporter_probe.status == 200
