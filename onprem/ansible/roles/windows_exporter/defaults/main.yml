---
# Matches onprem/scripts/install-windows-exporter.ps1. Bump deliberately.
windows_exporter_version: "0.29.2"
windows_exporter_port: 9182
windows_exporter_collectors: "cpu,cs,logical_disk,memory,net,os,service,system,tcp,time"

windows_exporter_msi: "windows_exporter-{{ windows_exporter_version }}-amd64.msi"
windows_exporter_msi_url: "https://github.com/prometheus-community/windows_exporter/releases/download/v{{ windows_exporter_version }}/{{ windows_exporter_msi }}"

# Inbound firewall scope — the monitoring subnets only (not Any).
windows_exporter_allowed_subnets:
  - "192.168.164.0/24"
  - "192.168.8.0/24"
