# Crown monitoring — Linux node_exporter targets.
#
# Prometheus discovers scrape targets dynamically via vcenter-sd, so this inventory
# only needs to cover the hosts we want the exporter *installed* on. Entries are
# IP-based: short names (e.g. apps-uat-1) don't resolve from a WSL/laptop control
# node — only the metrics-proxy resolves them internally. IPs are stable and avoid
# that dependency.
#
# Login is the inframcp infra service account (key in 1Password, passwordless sudo).

[all:vars]
ansible_user=inframcp

[linux]
apps-prod-1      ansible_host=192.168.164.252
apps-prod-2      ansible_host=192.168.164.207
apps-prod-mysql  ansible_host=192.168.164.206

[swarm]
apps-swarm-1     ansible_host=192.168.164.67
# apps-swarm-2 (.68) / apps-swarm-3 (.69): inframcp now works, but they ALREADY run
# node_exporter with a more thorough fs-types-exclude drop-in than this role sets —
# deliberately NOT managed here so the playbook doesn't regress them. They were
# fixed via explicit metrics-proxy routes, not Ansible.

[dev]
apps-dev-1       ansible_host=192.168.173.169
apps-dev-2       ansible_host=192.168.173.230
apps-dev-mysql   ansible_host=192.168.173.46

[uat]
apps-uat-1       ansible_host=192.168.173.52
apps-uat-2       ansible_host=192.168.173.53
apps-uat-mysql   ansible_host=192.168.173.51
uat-ftp          ansible_host=192.168.173.54

# Nextgen (Fusion) app servers run the microservice stack in Docker. The MinIO
# (file-service) container publishes host :9100 (and :9101), so node_exporter
# can't use the default port here — it listens on :9110 instead (see
# group_vars/nextgen_app.yml). The metrics-proxy has matching per-host routes.
[nextgen_app]
apps-nextgen-dev   ansible_host=192.168.174.184
apps-nextgen-test  ansible_host=192.168.174.183
apps-nextgen-uat   ansible_host=192.168.174.246

[nextgen_db]
apps-nextgen-dev-mysql-standalone  ansible_host=192.168.174.157
apps-nextgen-test-mysql-standalone ansible_host=192.168.174.99
apps-nextgen-uat-mysql-standalone  ansible_host=192.168.174.103

# Percona XtraDB cluster + ProxySQL. node_exporter restart is harmless, but prefer
# a maintenance-aware window if rolling the whole cluster at once.
[dbcluster]
proxysql-1       ansible_host=192.168.164.175
proxysql-2       ansible_host=192.168.164.176
pxc-node-1       ansible_host=192.168.164.171
pxc-node-2       ansible_host=192.168.164.172
pxc-node-3       ansible_host=192.168.164.173
pxc-node-4       ansible_host=192.168.164.174

[infra]
mainvpn              ansible_host=192.168.164.6
it-asset-manager     ansible_host=192.168.164.195
cloudflare-tunnel    ansible_host=192.168.164.53
reverseproxy         ansible_host=192.168.164.21
ftp                  ansible_host=192.168.164.56
openaccountsapi      ansible_host=192.168.164.47
crown-infra-mcp-01   ansible_host=192.168.173.39
poc-containers       ansible_host=192.168.164.184
apps-prod-mysql-backups ansible_host=192.168.164.103

# ---------------------------------------------------------------------------
# AD domain-join targets (ad-join.yml). SSH in as inframcp (agent); the realm
# join itself uses the jsa domain account passed at runtime. Auto-DNS via SSSD.
[domain_join]
cloudflare-tunnel ansible_host=192.168.164.53   # pilot

# ---------------------------------------------------------------------------
# Windows hosts — managed over WinRM (HTTP/5985, NTLM). Connection vars and the
# (uncommitted) credential live in group_vars/windows.yml. These are NOT part of
# the 'linux' umbrella group and use the windows-exporter.yml playbook.

[windows_vh]
IT-VH-DR       ansible_host=IT-VH-DR.crowngp.local
IT-VH-Prod1    ansible_host=192.168.164.131
IT-VH-Prod2    ansible_host=192.168.164.132
IT-VH-UAT-AA   ansible_host=192.168.164.71

[windows_test]
TEST-GENUS-ELEC ansible_host=TEST-GENUS-ELEC.crowngp.local
TEST-GENUS-GAS  ansible_host=TEST-GENUS-GAS.crowngp.local
# Test-RDS-Server: no WinRM listener reachable — excluded until that's sorted.

# Second trial batch — WinRM-reachable, NO live Genus (dev/UAT Genus only).
# FQDNs resolve from the WSL control node.
[windows_batch2]
openaccounts        ansible_host=openaccounts.crowngp.local
Cust-Care-Dash      ansible_host=Cust-Care-Dash.crowngp.local
Telerik-server      ansible_host=Telerik-server.crowngp.local
Prod-Gas-DochtecOA  ansible_host=Prod-Gas-DochtecOA.crowngp.local
PRINTERS            ansible_host=PRINTERS.crowngp.local
apps-dev-genus-elec ansible_host=apps-dev-genus-elec.crowngp.local
apps-devgas-genus   ansible_host=apps-devgas-genus.crowngp.local
Genus-Elec-UAT      ansible_host=Genus-Elec-UAT.crowngp.local
Genus-Gas-UAT       ansible_host=Genus-Gas-UAT.crowngp.local
UAT-Genus-HH-E      ansible_host=UAT-Genus-HH-E.crowngp.local

# Third batch — core infra (no Genus). CGPDC1 and Prod-MSSQL (live elec DB) held
# back deliberately. PROD-MSSQL-REP included (replica confirmed not in use).
[windows_batch3]
CGPDC2                    ansible_host=CGPDC2.crowngp.local
CGPDC3                    ansible_host=CGPDC3.crowngp.local
AZUREAD                   ansible_host=AZUREAD.crowngp.local
DHCP2                     ansible_host=DHCP2.crowngp.local
GAS-CERTIFICATE-AUTHORITY ansible_host=GAS-CERTIFICATE-AUTHORITY.crowngp.local
GAS-RADIUS-SVR            ansible_host=GAS-RADIUS-SVR.crowngp.local
CGPRDP                    ansible_host=CGPRDP.crowngp.local
CGPRDP-COLO               ansible_host=CGPRDP-COLO.crowngp.local
newnewexchange            ansible_host=newnewexchange.crowngp.local
PROD-MSSQL-REP            ansible_host=PROD-MSSQL-REP.crowngp.local

[windows:children]
windows_vh
windows_test
windows_batch2
windows_batch3

# ---------------------------------------------------------------------------
# 'linux' is the umbrella group the playbook targets. Fold every Linux group in here.
# [swarm] stays separate too so it picks up the filesystem-collector override
# (group_vars/swarm.yml).
[linux:children]
swarm
dev
uat
nextgen_app
nextgen_db
dbcluster
infra
