# Crown monitoring — Linux node_exporter targets.
#
# Hosts seeded from the metrics-proxy routing table (onprem/metrics-proxy-nginx.conf)
# and known Linux scrape targets. Prometheus discovers targets dynamically via
# vcenter-sd, so this inventory only needs to cover the hosts we want the exporter
# *installed* on — it does not have to match the scrape config one-for-one.
#
# Connection assumes SSH key auth as a sudo-capable user. Set ansible_user per host
# or globally with `-u <user>` / group_vars. crowngp.local short names resolve on-net.

[linux]
apps-prod-1      ansible_host=192.168.164.252
apps-prod-2      ansible_host=192.168.164.207
apps-prod-mysql  ansible_host=192.168.164.206
eps-worker-1     ansible_host=192.168.164.40

[swarm]
apps-swarm-1     ansible_host=192.168.164.67

# Dev app hosts — no exporter installed yet, so these are the fresh-install test
# targets. FQDNs resolve via crowngp.local on-net (no static IPs to hand). Confirm
# SSH reachability with `-m ping` before the first real run.
[dev]
apps-dev-1       ansible_host=192.168.173.169
apps-dev-2       ansible_host=192.168.173.230

# 'linux' is the umbrella group the playbook targets. Swarm and dev nodes are also
# Linux, so fold them in here while keeping the [swarm] group for the filesystem-
# collector override (see group_vars/swarm.yml).
[linux:children]
swarm
dev
