modules:
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4

  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      follow_redirects: true
      tls_config:
        insecure_skip_verify: true

  # For apps with no browsable 200 health route (token-URL flows, POST-only
  # webhook receivers). Any non-5xx response means the Apache+PHP+Laravel stack
  # is up and routing; only 5xx and connection failures count as down. Used by
  # the blackbox-aws-responding scrape job (esignature, webhooks).
  http_app_up:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 301, 302, 401, 403, 404]
      method: GET
      follow_redirects: true
      tls_config:
        insecure_skip_verify: true

  # Certificate monitoring — TLS verification ON, any HTTP status accepted.
  # Exposes probe_ssl_earliest_cert_expiry, probe_ssl_cert_not_after,
  # and probe_tls_version_info for the cert_probe scrape job.
  https_cert:
    prober: http
    timeout: 15s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []
      method: GET
      follow_redirects: true
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: false
      preferred_ip_protocol: ip4
      ip_protocol_fallback: true
