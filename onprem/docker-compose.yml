name: monitoring
services:
  pushgateway:
    image: prom/pushgateway:latest
    container_name: monitoring-pushgateway
    command:
    - --persistence.file=/data/pushgateway.dat
    volumes:
    - pushgateway_data:/data
    ports:
    - 9501:9091
    restart: unless-stopped
  monitoring-postgres:
    image: postgres:16-alpine
    container_name: monitoring-postgres
    environment:
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: monitoring
      POSTGRES_DB: monitoring
    volumes:
    - ./data/postgres:/var/lib/postgresql/data
    - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
    - 9508:5432
    restart: unless-stopped
  monitoring-postgrest:
    image: postgrest/postgrest:latest
    container_name: monitoring-postgrest
    environment:
      PGRST_DB_URI: postgres://monitoring:monitoring@monitoring-postgres:5432/monitoring
      PGRST_DB_ANON_ROLE: monitoring
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:9509
    ports:
    - 9509:3000
    depends_on:
    - monitoring-postgres
    restart: unless-stopped
  genus-monitor:
    build: ./genus-monitor
    container_name: monitoring-genus-monitor
    environment:
      GENUS_GAS_HOST: ${GENUS_GAS_HOST}
      GENUS_GAS_DB: ${GENUS_GAS_DB}
      GENUS_GAS_USER: ${GENUS_GAS_USER}
      GENUS_GAS_PASSWORD: ${GENUS_GAS_PASSWORD}
      GENUS_ELEC_HOST: ${GENUS_ELEC_HOST:-}
      GENUS_ELEC_DB: ${GENUS_ELEC_DB:-}
      GENUS_ELEC_USER: ${GENUS_ELEC_USER:-}
      GENUS_ELEC_PASSWORD: ${GENUS_ELEC_PASSWORD:-}
      MYSQL_HOST: ${MYSQL_HOST:-}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      PG_HOST: monitoring-postgres
      PG_PORT: 5432
      PG_DB: monitoring
      PG_USER: monitoring
      PG_PASSWORD: monitoring
      EPS_REDIS_HOST: ${EPS_REDIS_HOST:-}
      EPS_REDIS_PORT: ${EPS_REDIS_PORT:-6379}
      EPS_REDIS_PASSWORD: ${EPS_REDIS_PASSWORD:-}
      EPS_REDIS_PREFIX: ${EPS_REDIS_PREFIX:-eps_horizon:}
      PRTG_URL: ${PRTG_URL:-}
      PRTG_API_TOKEN: ${PRTG_API_TOKEN:-}
      POWERSTORE_HOST: ${POWERSTORE_HOST:-}
      POWERSTORE_USER: ${POWERSTORE_USER:-}
      POWERSTORE_PASSWORD: ${POWERSTORE_PASSWORD:-}
      UBIBOT_1_CHANNEL_ID: ${UBIBOT_1_CHANNEL_ID:-}
      UBIBOT_1_API_KEY: ${UBIBOT_1_API_KEY:-}
      UBIBOT_1_NAME: ${UBIBOT_1_NAME:-}
      UBIBOT_2_CHANNEL_ID: ${UBIBOT_2_CHANNEL_ID:-}
      UBIBOT_2_API_KEY: ${UBIBOT_2_API_KEY:-}
      UBIBOT_2_NAME: ${UBIBOT_2_NAME:-}
      UBIBOT_3_CHANNEL_ID: ${UBIBOT_3_CHANNEL_ID:-}
      UBIBOT_3_API_KEY: ${UBIBOT_3_API_KEY:-}
      UBIBOT_3_NAME: ${UBIBOT_3_NAME:-}
      UBIBOT_4_CHANNEL_ID: ${UBIBOT_4_CHANNEL_ID:-}
      UBIBOT_4_API_KEY: ${UBIBOT_4_API_KEY:-}
      UBIBOT_4_NAME: ${UBIBOT_4_NAME:-}
      POLL_INTERVAL_SECONDS: 30
    ports:
    - 9507:3000
    depends_on:
    - monitoring-postgres
    restart: unless-stopped
  powerstore-exporter:
    build:
      context: .
      dockerfile: powerstore-exporter/Dockerfile
    container_name: monitoring-powerstore-exporter
    environment:
      POWERSTORE_API_VERSION: ${POWERSTORE_API_VERSION:-1.0}
      POWERSTORE_USER: ${POWERSTORE_EXPORTER_USER}
      POWERSTORE_PASSWORD: ${POWERSTORE_EXPORTER_PASSWORD}
      POWERSTORE_1_ADDRESS: ${POWERSTORE_1_ADDRESS}
      POWERSTORE_1_NAME: ${POWERSTORE_1_NAME:-}
      POWERSTORE_2_ADDRESS: ${POWERSTORE_2_ADDRESS:-}
      POWERSTORE_2_NAME: ${POWERSTORE_2_NAME:-}
      POWERSTORE_3_ADDRESS: ${POWERSTORE_3_ADDRESS:-}
      POWERSTORE_3_NAME: ${POWERSTORE_3_NAME:-}
      POWERSTORE_4_ADDRESS: ${POWERSTORE_4_ADDRESS:-}
      POWERSTORE_4_NAME: ${POWERSTORE_4_NAME:-}
    volumes:
    - powerstore_sd:/sd
    ports:
    - 9521:9010
    restart: unless-stopped
  idrac-exporter:
    image: ghcr.io/mrlhansen/idrac_exporter:latest
    container_name: monitoring-idrac-exporter
    environment:
      IDRAC_USERNAME: ${IDRAC_USERNAME}
      IDRAC_PASSWORD: ${IDRAC_PASSWORD}
    volumes:
    - ./idrac-monitor/idrac.yml:/etc/prometheus/idrac.yml:ro
    ports:
    - 9516:9348
    restart: unless-stopped
  vmware-exporter:
    image: ghcr.io/prezhdarov/vmware-exporter:v0.1.17
    container_name: monitoring-vmware-exporter
    command:
    - -envflag.enable=true
    environment:
      vmware_vcenter: ${VCENTER_HOST}:443
      vmware_username: ${VCENTER_USER}
      vmware_password: ${VCENTER_PASSWORD}
      vmware_schema: https
      vmware_insecureTLS: ${VCENTER_IGNORE_SSL:-false}
    ports:
    - 9515:9169
    restart: unless-stopped
  blackbox-exporter:
    build:
      context: .
      dockerfile: blackbox-exporter/Dockerfile
    container_name: monitoring-blackbox
    cap_add:
      - NET_RAW
    volumes:
    - ./blackbox.yml:/etc/blackbox_exporter/config.yml
    ports:
    - 9514:9115
    restart: unless-stopped
  error-diagnosis:
    build: ./error-diagnosis
    container_name: monitoring-error-diagnosis
    read_only: true
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    environment:
      ANTHROPIC_API_KEY_DIAGNOSIS: ${ANTHROPIC_API_KEY_DIAGNOSIS:-}
      ANTHROPIC_API_KEY_INVESTIGATE: ${ANTHROPIC_API_KEY_INVESTIGATE:-}
      DIAGNOSIS_CLAUDE_MODEL: ${DIAGNOSIS_CLAUDE_MODEL:-claude-sonnet-4-6}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_PROJECT: ${JIRA_PROJECT:-CT}
      JIRA_SITE_URL: ${JIRA_SITE_URL:-https://crowngasandpower-team-delivery.atlassian.net}
      MYSQL_HOST: ${MYSQL_HOST:-}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_ORG: ${GITHUB_ORG:-crowngasandpower}
      DIAGNOSIS_TEAMS_WEBHOOK_URL: ${DIAGNOSIS_TEAMS_WEBHOOK_URL:-}
      DIAGNOSIS_COOLDOWN_HOURS: ${DIAGNOSIS_COOLDOWN_HOURS:-4}
      TEAMS_TENANT_ID: ${TEAMS_TENANT_ID:-}
      TEAMS_CLIENT_ID: ${TEAMS_CLIENT_ID:-}
      TEAMS_CLIENT_SECRET: ${TEAMS_CLIENT_SECRET:-}
      TEAMS_TEAM_ID: ${TEAMS_TEAM_ID:-}
      TEAMS_CHANNEL_ID: ${TEAMS_CHANNEL_ID:-}
      TEAMS_POLL_INTERVAL: ${TEAMS_POLL_INTERVAL:-15}
      TEAMS_REPLY_WEBHOOK_URL: ${TEAMS_REPLY_WEBHOOK_URL:-}
    ports:
    - 9524:3000
    restart: unless-stopped
  weather-exporter:
    build: ./weather-exporter
    container_name: monitoring-weather-exporter
    environment:
      WEATHER_LOCATIONS: ${WEATHER_LOCATIONS:-bury:53.5933:-2.2966}
    restart: unless-stopped
    ports:
      - "9522:3000"
  exemption-api:
    build: ./exemption-api
    container_name: monitoring-exemption-api
    environment:
      DB_HOST: monitoring-postgres
      DB_PORT: 5432
      DB_NAME: monitoring
      DB_USER: monitoring
      DB_PASSWORD: monitoring
      SD_DIR: /sd
    volumes:
      - powerstore_sd:/sd:ro
    ports:
      - "9529:8000"
    depends_on:
      - monitoring-postgres
      - vcenter-sd
    restart: unless-stopped

  unifi-exporter:
    build: ./unifi-exporter
    container_name: monitoring-unifi-exporter
    environment:
      UNIFI_API_KEY: ${UNIFI_API_KEY}
    ports:
      - "9526:3000"
    restart: unless-stopped

  unifi-local-exporter:
    build: ./unifi-local-exporter
    container_name: monitoring-unifi-local-exporter
    environment:
      UNIFI_1_URL: ${UNIFI_1_URL}
      UNIFI_1_NAME: ${UNIFI_1_NAME:-site1}
      UNIFI_1_API_KEY: ${UNIFI_1_API_KEY}
      UNIFI_1_SITE: ${UNIFI_1_SITE:-default}
      UNIFI_2_URL: ${UNIFI_2_URL:-}
      UNIFI_2_NAME: ${UNIFI_2_NAME:-}
      UNIFI_2_API_KEY: ${UNIFI_2_API_KEY:-}
      UNIFI_2_SITE: ${UNIFI_2_SITE:-default}
      UNIFI_3_URL: ${UNIFI_3_URL:-}
      UNIFI_3_NAME: ${UNIFI_3_NAME:-}
      UNIFI_3_API_KEY: ${UNIFI_3_API_KEY:-}
      UNIFI_3_SITE: ${UNIFI_3_SITE:-default}
      UNIFI_4_URL: ${UNIFI_4_URL:-}
      UNIFI_4_NAME: ${UNIFI_4_NAME:-}
      UNIFI_4_API_KEY: ${UNIFI_4_API_KEY:-}
      UNIFI_4_SITE: ${UNIFI_4_SITE:-default}
    ports:
      # 9525 on poc-containers is taken by crown-mcp-conversations-api; use 9531.
      - "9531:3000"
    restart: unless-stopped

  dell-os10-exporter:
    build: ./dell-os10-exporter
    container_name: monitoring-dell-os10-exporter
    environment:
      OS10_USER: ${OS10_USER:-readonly}
      OS10_PASSWORD: ${OS10_PASSWORD}
      OS10_1_ADDRESS: ${OS10_1_ADDRESS}
      OS10_1_NAME: ${OS10_1_NAME:-hq-sw1}
      OS10_2_ADDRESS: ${OS10_2_ADDRESS:-}
      OS10_2_NAME: ${OS10_2_NAME:-}
      OS10_3_ADDRESS: ${OS10_3_ADDRESS:-}
      OS10_3_NAME: ${OS10_3_NAME:-}
      OS10_4_ADDRESS: ${OS10_4_ADDRESS:-}
      OS10_4_NAME: ${OS10_4_NAME:-}
    ports:
      - "9523:3000"
    restart: unless-stopped

  vcenter-sd:
    build: ./vcenter-sd
    container_name: monitoring-vcenter-sd
    environment:
      VCENTER_HOST: ${VCENTER_HOST}
      VCENTER_USER: ${VCENTER_USER}
      VCENTER_PASSWORD: ${VCENTER_PASSWORD}
      VCENTER_IGNORE_SSL: ${VCENTER_IGNORE_SSL:-false}
      PUSHGATEWAY_URL: http://pushgateway:9091
      POLL_INTERVAL_SECONDS: ${VCENTER_SD_POLL_INTERVAL:-60}
    volumes:
      - powerstore_sd:/sd
    depends_on:
      - pushgateway
    restart: unless-stopped

volumes:
  pushgateway_data: null
  powerstore_sd: null
networks:
  traefik_public:
    external: true
    name: jenkins-poc_traefik_public
