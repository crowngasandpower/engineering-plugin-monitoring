# Alert rule groups — read by provision-alerts.py at container startup.
# These rules are provisioned via the Grafana API (not Grafana's built-in file
# provisioner) so they are fully editable in the Grafana UI.
#
# Live-edit contract:
#   - Edit a rule in the Grafana UI → takes effect immediately.
#   - Container restart → this file wins, UI edits are overwritten.
#   - To make a change permanent → edit this file and raise a PR.
#
# NOTE: folder names here use the flat on-prem structure (e.g. "Temperature").
# The images/ version uses the nested AWS structure (e.g. "Infrastructure Alerts/Temperature").

groups:
  - orgId: 1
    name: Temperature
    folder: Temperature
    interval: 1m
    rules:
      - uid: room-temp-warning
        title: Room Temperature Warning
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "Server room temperature is {{ $values.temp_c.Value | printf \"%.1f\" }}°C (warning: 29.5°C, critical: 30°C) — check cooling"
          __dashboardUid__: "server-room-temperature"
          __panelId__: "4"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/server-room-temperature?viewPanel=4"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: room_temperature_celsius
              refId: A
          - refId: temp_c
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: temp_c
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: temp_c
              conditions:
                - evaluator:
                    type: within_range
                    params:
                      - 29.5
                      - 30
              refId: threshold

      - uid: room-temp-critical
        title: Room Temperature Critical
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: "Server room temperature is {{ $values.temp_c.Value | printf \"%.1f\" }}°C (threshold: 30°C) — take immediate action"
          __dashboardUid__: "server-room-temperature"
          __panelId__: "4"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/server-room-temperature?viewPanel=4"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: room_temperature_celsius
              refId: A
          - refId: temp_c
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: temp_c
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: temp_c
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 30
              refId: threshold

  - orgId: 1
    name: SAN
    folder: SAN
    interval: 30s
    rules:
      - uid: powerstore-major-alert
        title: PowerStore Major Alert
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          __dashboardUid__: "powerstore-crown"
          __panelId__: "49"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/powerstore-crown?viewPanel=49"
          summary: "PowerStore has {{ $values.alert_count.Value | printf \"%.0f\" }} active Major/Critical alert(s)"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: sum(powerstore_active_alert_count{severity=~"Critical|Major"})
              refId: A
          - refId: alert_count
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: alert_count
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: alert_count
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: threshold

      - uid: powerstore-capacity
        title: PowerStore Capacity High
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          __dashboardUid__: "powerstore-crown"
          __panelId__: "2"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/powerstore-crown?viewPanel=2"
          summary: "PowerStore {{ $labels.appliance_id }} physical capacity at {{ $values.pct_used.Value | printf \"%.1f\" }}% used (threshold: 75%)"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_cap_last_physical_used / powerstore_cap_last_physical_total * 100 and powerstore_cap_last_physical_total > 0
              refId: A
          - refId: pct_used
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_used
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_used
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 75
              refId: threshold

      - uid: powerstore-drive-wear
        title: PowerStore Drive Wear Low
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          __dashboardUid__: "powerstore-crown"
          __panelId__: "42"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/powerstore-crown?viewPanel=42"
          summary: "PowerStore drive {{ $labels.name }} on {{ $labels.appliance_id }} has {{ $values.pct_remaining.Value | printf \"%.1f\" }}% endurance remaining"
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_wear_metrics_by_drive
              refId: A
          - refId: pct_remaining
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_remaining
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_remaining
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 20
              refId: threshold

      - uid: powerstore-eth-port-down
        title: PowerStore ETH Port Link Down
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          __dashboardUid__: "powerstore-crown"
          __panelId__: "41"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/powerstore-crown?viewPanel=41"
          summary: "PowerStore ETH port {{ $labels.eth_port_id }} on appliance {{ $labels.appliance_id }} link is down"
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_eth_port_is_link_up == 0 and on(appliance_id, eth_port_id) (max_over_time(powerstore_eth_port_is_link_up[1d]) == 1)
              refId: A
          - refId: link_up
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: link_up
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: link_up
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
              refId: threshold

      - uid: powerstore-eth-port-errors
        title: PowerStore ETH Port Errors
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          __dashboardUid__: "powerstore-crown"
          __panelId__: "41"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/powerstore-crown?viewPanel=41"
          summary: "PowerStore ETH port {{ $labels.eth_port_id }} on appliance {{ $labels.appliance_id }} has sustained packet errors: {{ $values.errors_per_sec.Value | printf \"%.0f\" }}/s"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_metricEthPort_avg_pkt_rx_crc_error_ps + powerstore_metricEthPort_avg_pkt_tx_error_ps
              refId: A
          - refId: errors_per_sec
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: errors_per_sec
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: errors_per_sec
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 100
              refId: threshold

      - uid: powerstore-metro-status
        title: PowerStore Metro Replication Not Engaged
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          __dashboardUid__: "powerstore-crown"
          __panelId__: "49"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/powerstore-crown?viewPanel=49"
          summary: "PowerStore metro session {{ $labels.id }} is not Engaged (state={{ $values.state.Value | printf \"%.0f\" }}: 0=Initializing 1=Disengaged 2=Engaged 3=WitnessInvalid 4=FailedInit 5=Unconfiguring)"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_metro_status
              refId: A
          - refId: state
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: state
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: state
              conditions:
                - evaluator:
                    type: outside_range
                    params:
                      - 2
                      - 2
              refId: threshold

      - uid: powerstore-metro-witness
        title: PowerStore Metro Witness Not OK
        condition: threshold
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          __dashboardUid__: "powerstore-crown"
          __panelId__: "49"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/powerstore-crown?viewPanel=49"
          summary: "PowerStore metro witness {{ $labels.name }} is not OK (state={{ $values.state.Value | printf \"%.0f\" }}: 0=OK 1=PartiallyConnected 2=Disconnected 3=Deleting 4=Initializing)"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: powerstore_metro_witness_status
              refId: A
          - refId: state
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: state
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: state
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              refId: threshold

  - orgId: 1
    name: ESXi
    folder: ESXi
    interval: 1m
    rules:
      # Threshold gt:5 = alert when usage exceeds HA headroom by more than 5%.
      # The 5% buffer prevents noise from near-threshold fluctuations and also
      # suppresses spurious fires on single-host clusters where (N-1)/N = 0%.
      - uid: vcenter-host-cpu-high
        title: vCenter Cluster CPU HA Headroom Exceeded
        condition: threshold
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
        annotations:
          __dashboardUid__: "VMwExClV"
          __panelId__: "14"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/VMwExClV?viewPanel=14"
          summary: "Cluster {{ $labels.vmwcluster }} CPU is {{ $values.pct_surplus.Value | printf \"%.1f\" }}% above HA failover headroom"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "(sum by (vmwcluster)(vmware_host_cpu_usagemhz_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) / sum by (vmwcluster)(vmware_host_cpu_capacity * vmware_host_cpu_corecount * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) * 100) - ((count by (vmwcluster)(vmware_host_cpu_usagemhz_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) - 1) / count by (vmwcluster)(vmware_host_cpu_usagemhz_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) * 100)"
              refId: A
          - refId: pct_surplus
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_surplus
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_surplus
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
              refId: threshold

      # Threshold gt:5 — same 5% buffer rationale as vcenter-host-cpu-high above.
      - uid: vcenter-cluster-mem-high
        title: vCenter Cluster Memory HA Headroom Exceeded
        condition: threshold
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
        annotations:
          __dashboardUid__: "VMwExClV"
          __panelId__: "16"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/VMwExClV?viewPanel=16"
          summary: "Cluster {{ $labels.vmwcluster }} memory is {{ $values.pct_surplus.Value | printf \"%.1f\" }}% above HA failover headroom"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: "(sum by (vmwcluster)(vmware_host_mem_consumed_average * 1024 * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) / sum by (vmwcluster)(vmware_host_mem_capacity * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) * 100) - ((count by (vmwcluster)(vmware_host_mem_consumed_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) - 1) / count by (vmwcluster)(vmware_host_mem_consumed_average * on(hostmo,vcenter) group_left(cmo) vmware_host_info * on(cmo,vcenter) group_left(vmwcluster) vmware_cluster_info) * 100)"
              refId: A
          - refId: pct_surplus
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_surplus
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_surplus
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
              refId: threshold

      - uid: vcenter-datastore-space-low
        title: vCenter Datastore Space Low
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
        annotations:
          __dashboardUid__: "VMwExDsV"
          __panelId__: "36"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/VMwExDsV?viewPanel=36"
          summary: "Datastore {{ $labels.ds }} has {{ $values.free_pct.Value | printf \"%.1f\" }}% free space remaining (warning: <20%, critical: <5%)"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: min by (ds,vcenter)(vmware_datastore_free / vmware_datastore_capacity * 100 * on(dsmo,vcenter) group_left(ds) max by (dsmo,vcenter,ds)(vmware_datastore_info))
              refId: A
          - refId: free_pct
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: free_pct
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: free_pct
              conditions:
                - evaluator:
                    type: within_range
                    params:
                      - 5
                      - 20
              refId: threshold

      - uid: vcenter-datastore-space-critical
        title: vCenter Datastore Space Critical
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
          oncall: "Platform"
        annotations:
          __dashboardUid__: "VMwExDsV"
          __panelId__: "36"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/VMwExDsV?viewPanel=36"
          summary: "Datastore {{ $labels.ds }} is over 95% full — {{ $values.free_pct.Value | printf \"%.1f\" }}% free"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: min by (ds,vcenter)(vmware_datastore_free / vmware_datastore_capacity * 100 * on(dsmo,vcenter) group_left(ds) max by (dsmo,vcenter,ds)(vmware_datastore_info))
              refId: A
          - refId: free_pct
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: free_pct
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: free_pct
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 5
              refId: threshold

      - uid: vcenter-host-mem-balloon
        title: vCenter Host Memory Balloon Active
        condition: threshold
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          __dashboardUid__: "VMwExHoV"
          __panelId__: "16"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/VMwExHoV?viewPanel=16"
          summary: "Host {{ $labels.host }} memory balloon at {{ $values.pct_ballooned.Value | printf \"%.1f\" }}% — host under memory pressure"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: vmware_host_mem_vmmemctl_average * 1024 / vmware_host_mem_capacity * 100 * on(hostmo,vcenter) group_left(host) vmware_host_info
              refId: A
          - refId: pct_ballooned
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_ballooned
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_ballooned
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
              refId: threshold

      - uid: vcenter-host-mem-swap
        title: vCenter Host Memory Swapping
        condition: threshold
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
        annotations:
          __dashboardUid__: "VMwExHoV"
          __panelId__: "16"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/VMwExHoV?viewPanel=16"
          summary: "Host {{ $labels.host }} VMs are swapping to disk — {{ $values.pct_swapped.Value | printf \"%.1f\" }}% of memory swapped"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: vmware_host_mem_swapped_average * 1024 / vmware_host_mem_capacity * 100 * on(hostmo,vcenter) group_left(host) vmware_host_info
              refId: A
          - refId: pct_swapped
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_swapped
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_swapped
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 1
              refId: threshold

      - uid: vcenter-host-cpu-ready
        title: vCenter Host CPU Ready High
        condition: threshold
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          __dashboardUid__: "VMwExHoV"
          __panelId__: "14"
          runbook_url: "http://grafana.poc.crowngasandpower.co.uk/d/VMwExHoV?viewPanel=14"
          summary: "Host {{ $labels.host }} CPU ready at {{ $values.pct_ready.Value | printf \"%.1f\" }}% — VMs waiting for CPU time"
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: vmware_host_cpu_ready_summation / (20 * 1000) / vmware_host_cpu_corecount * 100 * on(hostmo,vcenter) group_left(host) vmware_host_info
              refId: A
          - refId: pct_ready
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: pct_ready
          - refId: threshold
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: pct_ready
              conditions:
                - evaluator:
                    type: gt
