resolver 127.0.0.11 valid=10s;

upstream dashboard_api {
    server host.docker.internal:9518;
}

server {
    listen 3000;

    # --- Auth subrequest ---
    location = /_auth {
        internal;
        proxy_pass http://dashboard_api/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    # --- Login redirect ---
    error_page 401 = @login_redirect;
    location @login_redirect {
        return 302 http://tools.poc.crowngasandpower.co.uk/login.html;
    }

    # --- Jenkins proxy (authenticated) ---
    location / {
        auth_request /_auth;

        # Extract username and groups from auth response
        auth_request_set $auth_user $upstream_http_x_auth_user;
        auth_request_set $auth_groups $upstream_http_x_auth_groups;

        # Pass to Jenkins as trusted proxy headers
        proxy_set_header X-WEBAUTH-USER $auth_user;
        proxy_set_header X-WEBAUTH-GROUPS $auth_groups;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_pass http://host.docker.internal:8090;
        proxy_set_header Accept-Encoding "";

        # Inject "Engineering Tools" link
        sub_filter '</head>' '<style>.crown-tools-link{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:10000;padding:6px 14px;background:rgba(99,102,241,0.9);color:#fff;border-radius:6px;font-family:sans-serif;font-size:12px;text-decoration:none;font-weight:500;}.crown-tools-link:hover{background:rgba(129,140,248,0.95);}</style></head>';
        sub_filter '</body>' '<a class="crown-tools-link" href="http://tools.poc.crowngasandpower.co.uk/">&#8592; Engineering Tools</a></body>';
        sub_filter_once on;
        sub_filter_types text/html;

        # Jenkins CLI and agent connections
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
