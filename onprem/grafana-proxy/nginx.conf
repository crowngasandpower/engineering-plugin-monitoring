resolver 127.0.0.11 valid=10s;

# Internal endpoint for auth validation — calls dashboard-api in the
# crown-engineering-mcp stack via the host network.
upstream dashboard_api {
    server host.docker.internal:9518;
}

server {
    listen 3000;

    # --- Auth subrequest ---
    # Every request to Grafana first checks the crown_session cookie
    # against the dashboard-api /auth/me endpoint.
    location = /_auth {
        internal;
        proxy_pass http://dashboard_api/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    # --- Login redirect ---
    # If auth fails, redirect to the engineering portal login page.
    error_page 401 = @login_redirect;
    location @login_redirect {
        return 302 http://tools.poc.crowngasandpower.co.uk/login.html;
    }

    # --- Public dashboards (no auth required) ---
    location /public-dashboards/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
    }

    # --- Grafana API for public dashboards ---
    location /api/public/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
    }

    # --- Grafana static assets (frontend JS/CSS/fonts/images). Public
    # dashboards fetch these unauthenticated when bootstrapping the app.
    location /public/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
    }

    # --- Grafana proxy (authenticated) ---
    location / {
        auth_request /_auth;

        # Extract username and role from the auth response headers
        auth_request_set $auth_user $upstream_http_x_auth_user;
        auth_request_set $auth_role $upstream_http_x_auth_grafana_role;

        # Pass to Grafana as trusted proxy headers
        proxy_set_header X-WEBAUTH-USER $auth_user;
        proxy_set_header X-WEBAUTH-ROLE $auth_role;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";

        proxy_pass http://grafana:3000;

        # Inject "Engineering Tools" link into Grafana pages
        sub_filter '</head>' '<style>.crown-tools-link{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:10000;padding:6px 14px;background:rgba(99,102,241,0.9);color:#fff;border-radius:6px;font-family:sans-serif;font-size:12px;text-decoration:none;font-weight:500;}.crown-tools-link:hover{background:rgba(129,140,248,0.95);}</style></head>';
        sub_filter '</body>' '<a class="crown-tools-link" href="http://tools.poc.crowngasandpower.co.uk/">&#8592; Engineering Tools</a></body>';
        sub_filter_once on;
        sub_filter_types text/html;

        # WebSocket support for Grafana live
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
